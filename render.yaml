services:
  - type: web
    name: akmalexpress-web
    env: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn config.wsgi:application -c gunicorn.conf.py"
    disk:
      name: akmalexpress-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost,127.0.0.1
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
      - key: SQLITE_PATH
        value: /var/data/db.sqlite3
      - key: MEDIA_ROOT
        value: /var/data/media
      - key: SERVE_MEDIA_FILES
        value: "true"
      - key: SECURE_SSL_REDIRECT
        value: "true"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: CSRF_COOKIE_SECURE
        value: "true"
