{% extends 'base.html' %}
{% load tailwind_filters %}

{% block title %}Изменить заказ | AkmalExpress{% endblock %}

{% block content %}
<section class="form-panel">
    <h1 class="panel-title">Обновление заказа №{{ orderr.receipt_number }}</h1>
    <p class="panel-subtitle">Проверьте данные и сохраните изменения.</p>

    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <div class="form-actions">
            <button type="submit" class="btn-primary">Сохранить изменения</button>
            <a href="{% url 'detail_order' orderr.slug %}" class="btn-ghost">Вернуться к заказу</a>
        </div>
    </form>
</section>
{% endblock %}
