{% extends 'base.html' %}
{% load tailwind_filters %}

{% block title %}Создать продукт | AkmalExpress{% endblock %}

{% block content %}
<section class="form-panel">
    <h1 class="panel-title">Добавить продукт</h1>
    <p class="panel-subtitle">После добавления продукта можно сразу создать связанный заказ.</p>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form|crispy }}
        <div class="form-actions">
            <button type="submit" class="btn-primary">Сохранить продукт</button>
            <a href="{% url 'index' %}" class="btn-ghost">На главную</a>
        </div>
    </form>
</section>
{% endblock %}
