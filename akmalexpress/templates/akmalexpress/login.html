{% extends 'base.html' %}

{% block title %}Служебный вход | AkmalExpress{% endblock %}

{% block content %}
<div class="auth-wrap">
    <section class="auth-card">
        <h1>Служебный вход</h1>
        <p>Эта страница доступна только администраторам и суперпользователям.</p>

        <form method="post">
            {% csrf_token %}
            <div style="display: grid; gap: 0.85rem;">
                <div>
                    <label for="username">Никнейм</label>
                    <input type="text" name="username" id="username" placeholder="Введите никнейм" required>
                </div>
                <div>
                    <label for="password">Пароль</label>
                    <input type="password" name="password" id="password" placeholder="••••••••" required>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Войти</button>
                <a href="{% url 'index' %}" class="btn-ghost">На главную</a>
            </div>
        </form>
    </section>
</div>
{% endblock %}
