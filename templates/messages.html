{% if messages %}
    {% for message in messages %}
    <article class="alert {% if 'success' in message.tags %}alert-success{% elif 'error' in message.tags %}alert-error{% elif 'warning' in message.tags %}alert-warning{% else %}alert-info{% endif %}{% if 'sticky' in message.tags %} alert-sticky{% endif %}" {% if 'sticky' not in message.tags %}data-auto-dismiss="1"{% endif %}>
        <div class="alert-content">
            <span class="alert-icon" aria-hidden="true">
                {% if 'success' in message.tags %}
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="m8.5 12.2 2.2 2.3 4.8-5"></path>
                </svg>
                {% elif 'error' in message.tags %}
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="m15 9-6 6M9 9l6 6"></path>
                </svg>
                {% elif 'warning' in message.tags %}
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.72 3h16.92a2 2 0 0 0 1.72-3L13.71 3.86a2 2 0 0 0-3.42 0Z"></path>
                    <path d="M12 9v4"></path>
                    <path d="M12 17h.01"></path>
                </svg>
                {% else %}
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M12 16v-4"></path>
                    <path d="M12 8h.01"></path>
                </svg>
                {% endif %}
            </span>
            <p>{{ message }}</p>
        </div>
        <button type="button" class="alert-close" data-alert-close aria-label="Закрыть">
            <svg viewBox="0 0 20 20" aria-hidden="true">
                <path d="M5 5 15 15M15 5 5 15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
        </button>
    </article>
    {% endfor %}
{% endif %}
