<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content=
            "width=device-width, initial-scale=1.0">
    <title>Django + Tailwind CSS</title>
    <link rel="stylesheet"
          href="{% static 'output.css' %}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css?family=Poppins:400,800" rel="stylesheet"/>
    <!-- <link href="{% static 'css/main.css' %}" rel="stylesheet"/> -->
</head>
<body>
<div class="h-screen flex overflow-hidden">
    {% include 'sidebar.html' %}
    <div class="flex-1 flex-col overflow-y-auto overflow-x-hidden">
        {% include 'navbar.html' %}
        <div class="">
            {% if messages %}
            <div class="container mx-auto flex justify-center" style="margin-top: 100px">
                {% include 'messages.html' %}
                {% endif %}
            </div>
            <div class="margin-8 container mx-auto" style="margin-top: 100px;">
                {% block content %}
                {% endblock content %}
            </div>
        </div>
    </div>
</div>

<script type="text/html" src="../path/to/flowbite/dist/flowbite.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
<script src="../static/js/index.js"></script>
</body>
</html>
