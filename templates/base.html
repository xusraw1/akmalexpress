<!DOCTYPE html>
{% load static %}
<html lang="{{ current_lang|default:'ru' }}">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AkmalExpress{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'output.css' %}">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body class="app-body">
<div class="bg-orb orb-one"></div>
<div class="bg-orb orb-two"></div>

{% include 'navbar.html' %}

<div class="app-shell">
    {% include 'sidebar.html' %}

    <main class="app-main">
        {% if messages %}
        <section class="alerts-wrap">
            {% include 'messages.html' %}
        </section>
        {% endif %}

        <section class="content-shell">
            {% block content %}{% endblock content %}
        </section>
    </main>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" hidden></div>
<div class="image-lightbox" id="imageLightbox" hidden>
    <div class="image-lightbox__panel" role="dialog" aria-modal="true" aria-label="Просмотр фото">
        <button type="button" class="image-lightbox__close" id="imageLightboxClose" aria-label="Закрыть">
            <svg viewBox="0 0 20 20" aria-hidden="true">
                <path d="M5 5 15 15M15 5 5 15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
        </button>
        <img id="imageLightboxImage" class="image-lightbox__image" alt="">
        <p id="imageLightboxCaption" class="image-lightbox__caption" hidden></p>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
<script>
(function () {
    const toggleButton = document.getElementById('sidebarToggle');
    const sidebar = document.getElementById('appSidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const imageLightbox = document.getElementById('imageLightbox');
    const imageLightboxImage = document.getElementById('imageLightboxImage');
    const imageLightboxCaption = document.getElementById('imageLightboxCaption');
    const imageLightboxClose = document.getElementById('imageLightboxClose');

    const closeSidebar = () => {
        if (!sidebar) return;
        sidebar.classList.remove('is-open');
        if (overlay) overlay.hidden = true;
        if (toggleButton) toggleButton.setAttribute('aria-expanded', 'false');
    };

    const closeImageLightbox = () => {
        if (!imageLightbox) return;
        imageLightbox.hidden = true;
        if (imageLightboxImage) imageLightboxImage.src = '';
        document.body.classList.remove('modal-open');
    };

    const openImageLightbox = (src, caption) => {
        if (!imageLightbox || !imageLightboxImage) return;
        imageLightboxImage.src = src;
        imageLightboxImage.alt = caption || 'Фото заказа';
        if (imageLightboxCaption) {
            imageLightboxCaption.textContent = caption || '';
            imageLightboxCaption.hidden = !caption;
        }
        imageLightbox.hidden = false;
        document.body.classList.add('modal-open');
    };

    const openSidebar = () => {
        if (!sidebar) return;
        sidebar.classList.add('is-open');
        if (overlay) overlay.hidden = false;
        if (toggleButton) toggleButton.setAttribute('aria-expanded', 'true');
    };

    if (toggleButton && sidebar) {
        toggleButton.addEventListener('click', () => {
            if (sidebar.classList.contains('is-open')) {
                closeSidebar();
            } else {
                openSidebar();
            }
        });
    }

    if (overlay) {
        overlay.addEventListener('click', closeSidebar);
    }

    document.querySelectorAll('.sidebar-link').forEach((link) => {
        link.addEventListener('click', () => {
            if (window.innerWidth < 1024) {
                closeSidebar();
            }
        });
    });

    document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
            closeSidebar();
            closeImageLightbox();
        }
    });

    if (imageLightbox) {
        imageLightbox.addEventListener('click', (event) => {
            if (event.target === imageLightbox) {
                closeImageLightbox();
            }
        });
    }

    if (imageLightboxClose) {
        imageLightboxClose.addEventListener('click', closeImageLightbox);
    }

    document.querySelectorAll('[data-lightbox-image]').forEach((trigger) => {
        trigger.addEventListener('click', (event) => {
            event.preventDefault();
            const src = trigger.getAttribute('href');
            const caption = trigger.getAttribute('data-lightbox-title') || '';
            if (src) openImageLightbox(src, caption);
        });
    });

    const hideAlert = (alertElement) => {
        if (!alertElement || alertElement.dataset.hiding === '1') return;
        alertElement.dataset.hiding = '1';
        alertElement.classList.add('is-leaving');
        window.setTimeout(() => {
            alertElement.remove();
        }, 260);
    };

    document.querySelectorAll('[data-alert-close]').forEach((button) => {
        button.addEventListener('click', () => {
            const alert = button.closest('.alert');
            hideAlert(alert);
        });
    });

    document.querySelectorAll('[data-auto-dismiss="1"]').forEach((alert) => {
        window.setTimeout(() => {
            hideAlert(alert);
        }, 5000);
    });

    const setupResponsiveTables = () => {
        document.querySelectorAll('.data-table').forEach((table) => {
            const headers = Array.from(table.querySelectorAll('thead th')).map((th) =>
                th.textContent.replace(/\s+/g, ' ').trim()
            );
            if (!headers.length) return;

            table.querySelectorAll('tbody tr').forEach((row) => {
                Array.from(row.children).forEach((cell, index) => {
                    if (!(cell instanceof HTMLTableCellElement)) return;
                    if (!cell.dataset.label) {
                        cell.dataset.label = headers[Math.min(index, headers.length - 1)] || '';
                    }
                });
            });
        });
    };

    setupResponsiveTables();

    document.querySelectorAll('[data-copy-target]').forEach((button) => {
        button.addEventListener('click', async () => {
            const target = document.getElementById(button.getAttribute('data-copy-target'));
            if (!target) return;

            try {
                await navigator.clipboard.writeText(target.value || target.textContent || '');
                button.textContent = 'Скопировано';
                setTimeout(() => {
                    button.textContent = 'Копировать';
                }, 1400);
            } catch (error) {
                button.textContent = 'Ошибка';
                setTimeout(() => {
                    button.textContent = 'Копировать';
                }, 1400);
            }
        });
    });
})();
</script>
</body>
</html>
